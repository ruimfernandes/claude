# BuilderOS personalisation manifest.
# Runs on every fresh VM, in order, after THIS repo is checked out and before the agent launches.
apply:
  # 1. Install the skills bundled in this repo (skills/) into ~/.claude/skills.
  - run_script:
      script: setup/install-skills.sh
      run_as: dev

  # 2. Install OpenSpec globally.
  - run_script:
      script: setup/install-openspec.sh
      run_as: dev

  # 3. Add my git/mix aliases to the shell.
  - run_script:
      script: setup/setup-aliases.sh
      run_as: dev
